name: Claude Bug Fixer

on:
  issues:
    types: [opened, labeled]

jobs:
  fix-bug:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'bug') ||
      (github.event.action == 'opened' && contains(toJSON(github.event.issue.labels), '"name":"bug"'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git and gh CLI
        run: |
          git config --global user.email "claude-bot@users.noreply.github.com"
          git config --global user.name "Claude Bot"
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run Claude Bug Fixer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            A issue #${{ github.event.issue.number }} foi marcada como bug.

            Título: ${{ github.event.issue.title }}
            Descrição: ${{ github.event.issue.body }}

            Analise o repositório, encontre a causa raiz do bug e implemente a correção mínima necessária.

            Ao finalizar as alterações, crie o Pull Request linkando a issue com "Closes #${{ github.event.issue.number }}" no corpo.

            Diretrizes:
            - Faça apenas as mudanças necessárias para corrigir o bug — sem refatorações extras
            - Mantenha consistência com o estilo de código existente
            - Se o bug não for reproduzível ou a causa não for clara, comente na issue pedindo mais informações e não modifique nenhum arquivo
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git checkout -b *)",
                  "Bash(git add *)",
                  "Bash(git commit *)",
                  "Bash(git push *)",
                  "Bash(git status)",
                  "Bash(git diff *)",
                  "Bash(git log *)",
                  "Bash(gh pr create *)",
                  "Bash(gh issue comment *)",
                  "Bash(ls *)",
                  "Bash(find *)",
                  "Bash(grep *)",
                  "Bash(cat *)",
                  "Bash(echo *)",
                  "Bash(node *)",
                  "Bash(npm *)",
                  "Bash(npx *)",
                  "Bash(python3 *)",
                  "Bash(sed *)",
                  "Bash(awk *)",
                  "Edit",
                  "Write",
                  "MultiEdit"
                ],
                "deny": []
              }
            }
          claude_args: '--max-turns 30'
